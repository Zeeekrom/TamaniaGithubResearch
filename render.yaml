services:
  - type: web
    name: tasmania-research-dashboard
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: ZHIPU_API_KEY
        sync: false
      - key: ZHIPU_MODEL
        value: glm-4.7
      - key: HOST
        value: 0.0.0.0
